name: Deploy Dev Theme

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy Theme
        run: |
          shopify theme push \
            --store ${{ secrets.SHOPIFY_STORE }} \
            --password ${{ secrets.SHOPIFY_THEME_PASSWORD }} \
            --theme ${{ secrets.SHOPIFY_DEV_THEME_ID }}